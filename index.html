function getBestStore(p){ let best=null,bv=Infinity; STORES.forEach(s=>{ if(p.prices[s.id]!=null&&p.prices[s.id]<bv){bv=p.prices[s.id];best=s.id;} }); return best; }
function getBestPrice(p){ return Math.min(...STORES.filter(s=>p.prices[s.id]!=null).map(s=>p.prices[s.id])); }
function getWorstPrice(p){ return Math.max(...STORES.filter(s=>p.prices[s.id]!=null).map(s=>p.prices[s.id])); }
function fmt(v){ return `€${v.toFixed(2)}`; }
function perUnit(p){ if(!p.size) return null; if(p.size.includes("kg")&&!p.size.includes("×")){const kg=parseFloat(p.size);return kg&&kg!==1?fmt(getBestPrice(p)/kg)+"/kg":null;} if(p.size.includes("L")&&!p.size.includes("×")){const l=parseFloat(p.size);return l&&l!==1?fmt(getBestPrice(p)/l)+"/L":null;} return null; }

// ─── CHIP ──────────────────────────────────────────────────────────────────────
function Chip({label,selected,onToggle,color="#E8C547"}){
  return (
    <button className="chip-btn" onClick={onToggle}
      style={{background:selected?color:"#101828",borderColor:selected?color:"#1F2D45",color:selected?"#09111F":"#5A6A85"}}>
      {label}
    </button>
  );
}

// ─── STORE BADGE ──────────────────────────────────────────────────────────────
function StoreBadge({store,size=20,showName=false}){
  const {Logo,color,name}=store;
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:color+"1A",border:`1px solid ${color}33`,borderRadius:20,padding:showName?"3px 8px 3px 3px":"3px",flexShrink:0}}>
      <Logo size={size}/>
      {showName&&<span style={{fontSize:11,fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,color}}>{name}</span>}

// ─── PRICE BAR ────────────────────────────────────────────────────────────────
function PriceBar({prod}){
  const best=getBestStore(prod),bestPrice=getBestPrice(prod),worstPrice=getWorstPrice(prod);
  const worst=STORES.filter(s=>prod.prices[s.id]!=null).reduce((a,b)=>prod.prices[b.id]>prod.prices[a.id]?b:a).id;
  return (
    <div>
      {STORES.filter(s=>prod.prices[s.id]!=null).map(store=>{
        const price=prod.prices[store.id],isBest=store.id===best,isWorst=store.id===worst;
        const barW=((price-bestPrice)/Math.max(worstPrice-bestPrice,0.01))*55+10;
        return (
          <div key={store.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:86,display:"flex",alignItems:"center",gap:6}}>
              <store.Logo size={17}/>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontWeight:700,color:store.color}}>{store.name}</span>
            </div>
            <div style={{flex:1,background:"#0D1825",borderRadius:3,height:5,overflow:"hidden"}}>
              <div style={{width:barW+"%",height:"100%",background:isBest?"#6DBF6D":isWorst?"#E05050":"#2A3A60",borderRadius:3}}/>
            </div>
            <div style={{minWidth:54,textAlign:"right",fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:isBest?"#6DBF6D":isWorst?"#E05050":"#A8A090"}}>{fmt(price)}</div>
            <div style={{minWidth:72,fontSize:9,fontFamily:"'Source Sans 3',sans-serif"}}>
              {isBest&&<span style={{color:"#6DBF6D",fontWeight:900}}>✓ CHEAPEST</span>}
              {isWorst&&!isBest&&<span style={{color:"#E05050"}}>PRICIEST</span>}
              {prod.sale&&prod.sale[store.id]&&<span className="sale-tag" style={{marginLeft:2}}>SALE</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── ONBOARDING STEP ──────────────────────────────────────────────────────────
function OnboardStep({cat,prefs,setPrefs,stepNum,isLast,onNext,onSkip}){
  const meta=CAT_META[cat]||{hasFat:false,hasBrand:false,sizes:[]};
  const catProds=PRODUCTS.filter(p=>p.category===cat);
  const brands=[...new Set(catProds.map(p=>p.brand))];
  const fats=meta.hasFat?[...new Set(catProds.map(p=>p.fatPct).filter(Boolean))].sort((a,b)=>b-a):[];
  const p=prefs[cat]||{anyBrand:true,brands:[],excludedBrands:[],anyFat:true,fats:[],sizes:[]};
  const set=(k,v)=>setPrefs(prev=>({...prev,[cat]:{...p,[k]:v}}));
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
        <div style={{fontSize:36}}>{CAT_ICONS[cat]}</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,color:"#EDE5D0"}}>{cat}</div>
          <div style={{fontSize:12,color:"#3A4A65",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>Customize what we track for you</div>
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:10,color:"#2A3A55",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Source Sans 3',sans-serif",marginBottom:8}}>Brand preference</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <Chip label="Any brand — best price" selected={p.anyBrand} onToggle={()=>set("anyBrand",true)} color="#6DBF6D"/>
          <Chip label="Specific brands only" selected={!p.anyBrand} onToggle={()=>set("anyBrand",false)}/>
        </div>
        {!p.anyBrand&&<>
          <div style={{fontSize:10,color:"#2A5020",letterSpacing:"1.5px",fontFamily:"'Source Sans 3',sans-serif",marginBottom:6,marginTop:10}}>✓ BRANDS I WANT</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>{brands.map(b=><Chip key={b} label={b} selected={p.brands.includes(b)} onToggle={()=>set("brands",p.brands.includes(b)?p.brands.filter(x=>x!==b):[...p.brands,b])}/>)}</div>
          <div style={{fontSize:10,color:"#5A2A2A",letterSpacing:"1.5px",fontFamily:"'Source Sans 3',sans-serif",marginBottom:6}}>✕ NEVER SHOW ME</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{brands.map(b=><Chip key={b} label={b} selected={p.excludedBrands.includes(b)} color="#E05050" onToggle={()=>set("excludedBrands",p.excludedBrands.includes(b)?p.excludedBrands.filter(x=>x!==b):[...p.excludedBrands,b])}/>)}</div>
        </>}
      </div>
      {meta.hasFat&&fats.length>0&&<div style={{marginBottom:18}}>
        <div style={{fontSize:10,color:"#2A3A55",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Source Sans 3',sans-serif",marginBottom:8}}>Fat content</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <Chip label="Any fat %" selected={p.anyFat} onToggle={()=>set("anyFat",true)} color="#6DBF6D"/>
          <Chip label="Specific %" selected={!p.anyFat} onToggle={()=>set("anyFat",false)}/>
        </div>
        {!p.anyFat&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{fats.map(f=><Chip key={f} label={f+"%"} selected={p.fats.includes(f)} onToggle={()=>set("fats",p.fats.includes(f)?p.fats.filter(x=>x!==f):[...p.fats,f])}/>)}</div>}
      </div>}
      {meta.sizes.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:10,color:"#2A3A55",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Source Sans 3',sans-serif",marginBottom:6}}>Preferred sizes</div>
        <div style={{fontSize:11,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginBottom:8}}>💡 More sizes = better value comparisons</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{meta.sizes.map(s=><Chip key={s} label={s} selected={p.sizes.includes(s)} onToggle={()=>set("sizes",p.sizes.includes(s)?p.sizes.filter(x=>x!==s):[...p.sizes,s])}/>)}</div>
      </div>}
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:20,paddingBottom:4}}>
        {catProds.slice(0,5).map(prod=>(
          <div key={prod.id} style={{flexShrink:0,width:86,background:"#0D1520",border:"1px solid #1A2540",borderRadius:10,padding:9,textAlign:"center"}}>
            <img src={prod.img} alt={prod.nameEN} onError={e=>e.target.style.display="none"} style={{width:46,height:46,objectFit:"contain",borderRadius:6,marginBottom:4}}/>
            <div style={{fontSize:10,color:"#4A5A75",fontFamily:"'Source Sans 3',sans-serif"}}>{prod.brand}</div>
            <div style={{fontSize:13,color:"#6DBF6D",fontFamily:"'Playfair Display',serif",fontWeight:800,marginTop:2}}>{fmt(getBestPrice(prod))}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onNext} style={{flex:1,background:"#E8C547",border:"none",borderRadius:8,padding:"14px 20px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:14,color:"#09111F",cursor:"pointer"}}>
          {isLast?"✓ Finish Setup":"Next: "+ONBOARD_CATS[stepNum+1]+" →"}
        </button>
        <button onClick={onSkip} style={{background:"none",border:"1px solid #1F2D45",borderRadius:8,padding:"14px 16px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:13,color:"#3A4A65",cursor:"pointer"}}>Skip</button>
      </div>
    </div>
  );
}

  const [lang,setLang]         = useState("EN");
  const [view,setView]         = useState("list");
  const [weeklyList,setList]   = useState(new Set(DEFAULT_LIST));
  const [quantities,setQtys]   = useState({});
  const [search,setSearch]     = useState("");
  const [selCat,setSelCat]     = useState("All");
  const [expandedId,setExpId]  = useState(null);
  const [selStore,setSelStore] = useState(null);
  const [animIn,setAnimIn]     = useState(false);
  const [watchlist,setWatch]   = useState(new Set());
  const [sortMode,setSortMode] = useState("savings");

  useEffect(()=>{ setTimeout(()=>setAnimIn(true),80); },[]);

  const pname = prod => lang==="BG"?prod.nameBG:prod.nameEN;
  const getQty = id => quantities[id]||1;
  const toggleItem = id => setList(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });
  const toggleWatch = id => setWatch(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });

  const applyPrefs = prod=>{
    const cp=prefs[prod.category]; if(!cp) return true;
    if(!cp.anyBrand&&cp.brands.length>0&&!cp.brands.includes(prod.brand)) return false;
    if(cp.excludedBrands?.includes(prod.brand)) return false;
    if(!cp.anyFat&&cp.fats?.length>0&&prod.fatPct&&!cp.fats.includes(prod.fatPct)) return false;
    if(cp.sizes?.length>0&&prod.size&&!cp.sizes.includes(prod.size)) return false;
    return true;
  };

  const visibleProds = useMemo(()=>PRODUCTS.filter(applyPrefs),[prefs]);
  const searchProds  = useMemo(()=>visibleProds.filter(p=>
    pname(p).toLowerCase().includes(search.toLowerCase())&&(selCat==="All"||p.category===selCat)
  ),[visibleProds,search,selCat,lang]);

  const listItems      = PRODUCTS.filter(p=>weeklyList.has(p.id));
  const optimizedTotal = listItems.reduce((s,p)=>s+getBestPrice(p)*getQty(p.id),0);
  const worstTotal     = listItems.reduce((s,p)=>s+getWorstPrice(p)*getQty(p.id),0);
  const savings        = worstTotal-optimizedTotal;
  const savingsPct     = worstTotal>0?((savings/worstTotal)*100).toFixed(0):0;

  const storeBreakdown = STORES.map(store=>{
    const items=listItems.filter(p=>getBestStore(p)===store.id);
    const total=items.reduce((s,p)=>s+p.prices[store.id]*getQty(p.id),0);
    const altTotal=items.reduce((s,p)=>s+getWorstPrice(p)*getQty(p.id),0);
    return {...store,items,total,storeSavings:altTotal-total};

  const sortedListProdsFor = cat => {
    const items = visibleProds.filter(p=>p.category===cat&&(search===""||pname(p).toLowerCase().includes(search.toLowerCase())));
    if(sortMode==="savings") return [...items].sort((a,b)=>(getWorstPrice(b)-getBestPrice(b))-(getWorstPrice(a)-getBestPrice(a)));
    if(sortMode==="price")   return [...items].sort((a,b)=>getBestPrice(a)-getBestPrice(b));
    return [...items].sort((a,b)=>pname(a).localeCompare(pname(b)));
  };

  const cats=["All",...Object.keys(CAT_ICONS)];

  // ── WELCOME ────────────────────────────────────────────────────────────────
  if(phase==="welcome") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 18% 50%,#0B1E3A 0%,#05090F 65%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>

          {Object.keys(CAT_ICONS).map(cat=>{
            const catProds=sortedListProdsFor(cat);
            if(catProds.length===0) return null;
            const sel=catProds.filter(p=>weeklyList.has(p.id)).length;
            return (
              <div key={cat} style={{marginBottom:22}}>
                <div style={{fontSize:10,fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"#1F2D45",marginBottom:9,display:"flex",alignItems:"center",gap:7}}>
                  <span>{CAT_ICONS[cat]}</span>{cat}
                  <span style={{color:"#131E30",fontWeight:400,marginLeft:2}}>({sel}/{catProds.length})</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {catProds.map(prod=>{
                    const isIn=weeklyList.has(prod.id);
                    const best=getBestStore(prod);
                    const bStore=STORES.find(s=>s.id===best);
                    const qty=getQty(prod.id);
                    const unitSave=getWorstPrice(prod)-getBestPrice(prod);
                    const pu=perUnit(prod);
                    return (
                      <div key={prod.id} className={"icard"+(isIn?" inlist":"")} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px"}}>
                        <div className={"check-box"+(isIn?" chk":"")} onClick={()=>toggleItem(prod.id)}>
                          {isIn&&<span style={{color:"#09111F",fontSize:12,fontWeight:900}}>✓</span>}
                        </div>
                        <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:40,height:40,objectFit:"contain",borderRadius:6,background:"#131E30",flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,color:"#EDE5D0"}}>{pname(prod)}</span>
                            {prod.sale&&prod.sale[best]&&<span className="sale-tag">SALE</span>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                            <StoreBadge store={bStore} size={15} showName={true}/>
                            {pu&&<span style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>{pu}</span>}
                            {unitSave>0.01&&isIn&&<span style={{fontSize:10,color:"#1A5010",fontFamily:"'Source Sans 3',sans-serif"}}>save {fmt(unitSave)}/unit</span>}
                          </div>
                        </div>
                        {isIn&&<div style={{display:"flex",alignItems:"center",gap:4}}>
                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:Math.max(1,qty-1)}))}>−</button>
                          <span style={{fontSize:13,fontWeight:800,minWidth:20,textAlign:"center",fontFamily:"'Source Sans 3',sans-serif"}}>{qty}</span>
                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:qty+1}))}>+</button>
                        </div>}
                        <div style={{textAlign:"right",minWidth:60}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:15,color:isIn?"#E8C547":"#2A3A55"}}>{fmt(getBestPrice(prod)*qty)}</div>
                          <button className={"watch-btn"+(watchlist.has(prod.id)?" watching":"")} onClick={()=>toggleWatch(prod.id)}
                            style={{opacity:watchlist.has(prod.id)?1:0.4,color:watchlist.has(prod.id)?"#E8C547":"inherit"}}>
                            {watchlist.has(prod.id)?"🔔":"🔕"}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>}

        {/* ══ TAB: FIND ITEM ══ */}
        {view==="search"&&<div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,marginBottom:3}}>{lang==="BG"?"Намери Продукт":"Find a Product"}</div>
          <div style={{fontSize:13,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginBottom:14}}>{lang==="BG"?"Tap за да сравниш цените в 4 магазина":"Tap any item to compare prices across all 4 stores"}</div>

          <div style={{position:"relative",marginBottom:12}}>
            <input className="inp" placeholder={lang==="BG"?"Търси... (мляко, кайма, яйца)":"Search... (milk, beef, eggs, coffee)"} value={search} onChange={e=>{setSearch(e.target.value);setExpId(null);}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#3A4A65",fontSize:20,cursor:"pointer"}}>×</button>}
          </div>

          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
            {cats.map(c=>(
              <button key={c} className={"cat-pill"+(selCat===c?" active":"")} onClick={()=>setSelCat(c)}>
                {c==="All"?(lang==="BG"?"Всички":"All"):(CAT_ICONS[c]||"")+" "+c}
              </button>
            ))}
          </div>

          {selCat==="All"&&!search&&<div style={{marginBottom:18}}>
            <div style={{fontSize:10,color:"#4A3000",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginBottom:9}}>🔥 ON SALE THIS WEEK</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
              {PRODUCTS.filter(p=>Object.values(p.sale).some(Boolean)&&applyPrefs(p)).slice(0,8).map(prod=>{
                const saleStore=STORES.find(s=>prod.sale[s.id]);
                return (
                  <div key={prod.id} onClick={()=>setExpId(prod.id)} style={{flexShrink:0,width:95,background:"#1A1000",border:"1px solid #3A2800",borderRadius:10,padding:9,cursor:"pointer",textAlign:"center"}}>
                    <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:46,height:46,objectFit:"contain",borderRadius:6,marginBottom:4}}/>
                    <div style={{fontSize:10,color:"#B08020",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,lineHeight:1.2,marginBottom:3}}>{pname(prod).split(" ").slice(0,3).join(" ")}</div>
                    <div style={{fontSize:13,color:"#6DBF6D",fontFamily:"'Playfair Display',serif",fontWeight:800}}>{fmt(getBestPrice(prod))}</div>
                    {saleStore&&<div style={{marginTop:3}}><saleStore.Logo size={14}/></div>}
                  </div>
                );
              })}
            </div>
          </div>}

          {searchProds.length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>
            No products match.<br/>
            <button className="ctrl-btn" style={{marginTop:12}} onClick={()=>setPhase("onboarding")}>Adjust Preferences</button>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {searchProds.map(prod=>{
              const best=getBestStore(prod),bestPrice=getBestPrice(prod),worstPrice=getWorstPrice(prod);
              const isExp=expandedId===prod.id;
              const bStore=STORES.find(s=>s.id===best);
              return (
                <div key={prod.id} className={"icard"+(isExp?" exp":"")+(weeklyList.has(prod.id)?" inlist":"")}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",cursor:"pointer"}} onClick={()=>setExpId(isExp?null:prod.id)}>
                    <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:46,height:46,objectFit:"contain",borderRadius:7,background:"#131E30",flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,color:"#EDE5D0"}}>{pname(prod)}</span>
                        {prod.sale&&Object.values(prod.sale).some(Boolean)&&<span className="sale-tag">SALE</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginTop:3,flexWrap:"wrap"}}>
                        <StoreBadge store={bStore} size={15} showName={true}/>
                        <span style={{fontSize:11,color:"#1A5010",fontFamily:"'Source Sans 3',sans-serif"}}>save {fmt(worstPrice-bestPrice)}</span>
                        {perUnit(prod)&&<span style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>{perUnit(prod)}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#6DBF6D"}}>{fmt(bestPrice)}</div>
                      <div style={{color:"#2A3A55",fontSize:13,transition:"transform 0.2s",transform:isExp?"rotate(180deg)":"none",marginTop:1}}>⌄</div>
                    </div>
                  </div>
                  {isExp&&<div style={{borderTop:"1px solid #131E30",background:"#070D1A",padding:"14px 13px"}}>
                    <PriceBar prod={prod}/>
                    <div style={{display:"flex",gap:8,marginTop:10}}>
                      <button onClick={()=>toggleItem(prod.id)} style={{flex:1,background:weeklyList.has(prod.id)?"#071A07":"#E8C547",color:weeklyList.has(prod.id)?"#6DBF6D":"#09111F",border:weeklyList.has(prod.id)?"1px solid #163016":"none",borderRadius:6,padding:"8px 14px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                        {weeklyList.has(prod.id)?(lang==="BG"?"✓ В списъка":"✓ In My List"):(lang==="BG"?"+ Добави":"+ Add to List")}
                      </button>
                      <button className={"watch-btn"} onClick={()=>toggleWatch(prod.id)}
                        style={{background:"#0D1825",border:"1px solid #172030",borderRadius:6,padding:"8px 11px",fontSize:14,cursor:"pointer",opacity:watchlist.has(prod.id)?1:0.5,color:watchlist.has(prod.id)?"#E8C547":"inherit"}}>
                        {watchlist.has(prod.id)?"🔔":"🔕"}
                      </button>
                    </div>
                  </div>}
                </div>
              );
            })}
          </div>
        </div>}

        {/* ══ TAB: BY STORE ══ */}
        {view==="storeview"&&<div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,marginBottom:3}}>{lang==="BG"?"Разпределение по Магазин":"Your Shopping Plan by Store"}</div>
          <div style={{fontSize:13,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginBottom:18}}>{lang==="BG"?"Кликни на магазин за пълния списък":"Split your cart across stores — tap a store to see your list for it"}</div>

          <div className="store-grid" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:20}}>
            {STORES.map(store=>{
              const storeItems=listItems.filter(p=>getBestStore(p)===store.id);
              const storeTotal=storeItems.reduce((s,p)=>s+p.prices[store.id]*getQty(p.id),0);
              const isSel=selStore===store.id;
              return (
                <button key={store.id} className="store-card" onClick={()=>setSelStore(isSel?null:store.id)}
                  style={{background:isSel?store.color+"20":"#0D1520",border:`2px solid ${isSel?store.color:"#172030"}`,borderRadius:12,padding:"13px 11px",cursor:"pointer",textAlign:"left",transition:"all 0.2s",width:"100%"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                    <store.Logo size={28}/>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:isSel?store.color:"#EDE5D0"}}>{store.name}</div>
                  </div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:isSel?store.color:"#6DBF6D"}}>{fmt(storeTotal)}</div>
                  <div style={{fontSize:11,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>{storeItems.length} items cheapest here</div>
                </button>
              );
            })}
          </div>

          {selStore&&(()=>{
            const store=STORES.find(s=>s.id===selStore);
            const storeItems=listItems.filter(p=>getBestStore(p)===store.id);
            const storeTotal=storeItems.reduce((s,p)=>s+p.prices[store.id]*getQty(p.id),0);
            const altTotal=storeItems.reduce((s,p)=>s+getWorstPrice(p)*getQty(p.id),0);
            if(storeItems.length===0) return <div style={{textAlign:"center",padding:"28px 20px",color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",background:"#0D1520",borderRadius:12}}>None of your list items are cheapest at {store.name} this week.</div>;
            return (
              <div className="slidein" style={{background:"#0A0F1A",border:`1px solid ${store.color}33`,borderRadius:12,overflow:"hidden"}}>
                <div style={{background:`${store.color}1A`,padding:"12px 15px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <store.Logo size={30}/>
                    <div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:15,color:store.color}}>Buy these at {store.name}</div>
                      <div style={{fontSize:11,color:"#3A4A65",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>{storeItems.length} items · save {fmt(altTotal-storeTotal)} vs. priciest</div>
                    </div>
                  </div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20}}>{fmt(storeTotal)}</div>
                </div>
                <div style={{padding:"9px 15px"}}>
                  {storeItems.map(prod=>{
                    const qty=getQty(prod.id);
                    return (
                      <div key={prod.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 0",borderBottom:"1px solid #0D1520"}}>
                        <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:38,height:38,objectFit:"contain",borderRadius:6,background:"#131E30",flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</div>
                          <div style={{display:"flex",gap:9,marginTop:2,alignItems:"center"}}>
                            <span style={{fontSize:11,color:"#2A3A55",textDecoration:"line-through",fontFamily:"'Source Sans 3',sans-serif"}}>{fmt(getWorstPrice(prod))}</span>
                            <span style={{fontSize:13,color:"#6DBF6D",fontFamily:"'Playfair Display',serif",fontWeight:800}}>{fmt(prod.prices[store.id])}</span>
                            {prod.sale&&prod.sale[store.id]&&<span className="sale-tag">SALE</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:Math.max(1,qty-1)}))}>−</button>
                          <span style={{fontSize:12,fontWeight:800,minWidth:18,textAlign:"center",fontFamily:"'Source Sans 3',sans-serif"}}>{qty}</span>
                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:qty+1}))}>+</button>
                        </div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:"#E8C547",minWidth:52,textAlign:"right"}}>{fmt(prod.prices[store.id]*qty)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {!selStore&&<div>
            <div style={{fontSize:10,color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginBottom:10}}>FULL BREAKDOWN</div>
            {listItems.length===0?<div style={{textAlign:"center",padding:"38px 20px",color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif"}}>
              Add items to your list first.<br/>
              <button className="ctrl-btn" style={{marginTop:12}} onClick={()=>setView("list")}>Go to My List</button>
            </div>:storeBreakdown.map(store=>(
              <div key={store.id} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
                  <store.Logo size={24}/>
                  <span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:store.color}}>{store.name}</span>
                  <span style={{fontSize:12,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>· {fmt(store.total)}</span>
                </div>
                {store.items.map(prod=>(
                  <div key={prod.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#0D1520",border:`1px solid ${store.color}20`,borderRadius:8,marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:30,height:30,objectFit:"contain",borderRadius:4,background:"#131E30",flexShrink:0}}/>
                      <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</span>
                      {prod.sale&&prod.sale[store.id]&&<span className="sale-tag">SALE</span>}
                    </div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#1F2D45",textDecoration:"line-through",fontFamily:"'Source Sans 3',sans-serif"}}>{fmt(getWorstPrice(prod))}</span>
                      <span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:13,color:"#6DBF6D"}}>{fmt(prod.prices[store.id])}</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>}
        </div>}

        {/* ══ TAB: SAVINGS ══ */}
        {view==="summary"&&<div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,marginBottom:3}}>{lang==="BG"?"Вашите Спестявания":"Your Savings Report"}</div>
          <div style={{fontSize:13,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginBottom:18}}>{lang==="BG"?"Реалната стойност на умното пазаруване":"The real value of shopping smart this week"}</div>

          {listItems.length===0?<div style={{textAlign:"center",padding:"58px 20px",color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif"}}>
            Add items to your list to see your savings.<br/>
            <button className="ctrl-btn" style={{marginTop:12}} onClick={()=>setView("list")}>Go to My List</button>
          </div>:<>
            <div style={{background:"linear-gradient(135deg,#071807,#050E05)",border:"1px solid #163016",borderRadius:16,padding:"28px 22px",textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:10,fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2.5px",textTransform:"uppercase",color:"#1A5010",marginBottom:7}}>{lang==="BG"?"ТАЗИ СЕДМИЦА СПЕСТЯВАТЕ":"THIS WEEK YOU SAVE"}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:60,fontWeight:900,color:"#6DBF6D",lineHeight:1}}>{fmt(savings)}</div>
              <div style={{fontSize:13,color:"#1A5010",fontFamily:"'Source Sans 3',sans-serif",marginTop:7}}>
                {savingsPct}% {lang==="BG"?"по-евтино vs. най-скъпия вариант":"cheaper vs. buying everything at the priciest store"}
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:40,marginTop:22}}>
                <div>
                  <div style={{fontSize:9,color:"#0E4008",letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:"'Source Sans 3',sans-serif"}}>Optimal Total</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:"#6DBF6D"}}>{fmt(optimizedTotal)}</div>
                </div>
                <div style={{width:1,background:"#163016"}}/>
                <div>
                  <div style={{fontSize:9,color:"#0E4008",letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:"'Source Sans 3',sans-serif"}}>Without Comparing</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:"#E05050"}}>{fmt(worstTotal)}</div>
                </div>
              </div>
              <div style={{marginTop:12,fontSize:11,color:"#0E4008",fontFamily:"'Source Sans 3',sans-serif"}}>
                Annual savings estimate: ~<strong style={{color:"#6DBF6D",fontSize:13}}>{fmt(savings*52)}</strong>
              </div>
            </div>

            <div style={{fontSize:10,color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginBottom:10}}>{lang==="BG"?"ПЛАН ЗА ПАЗАРУВАНЕ":"THIS WEEK'S SHOPPING PLAN"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:22}}>
              {storeBreakdown.map(store=>(
                <div key={store.id} style={{border:`1px solid ${store.color}28`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:`${store.color}18`,padding:"11px 15px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <store.Logo size={28}/>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:store.color}}>{store.name}</div>
                        <div style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>{store.items.length} item{store.items.length!==1?"s":""} · save {fmt(store.storeSavings)}</div>
                      </div>
                    </div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19}}>{fmt(store.total)}</div>
                  </div>
                  <div style={{padding:"7px 15px"}}>
                    {store.items.map(prod=>(
                      <div key={prod.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #0A0F1A"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:28,height:28,objectFit:"contain",borderRadius:4,background:"#0D1520",flexShrink:0}}/>
                          <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</span>
                          {prod.sale&&prod.sale[store.id]&&<span className="sale-tag">SALE</span>}
                        </div>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontSize:10,color:"#1F2D45",textDecoration:"line-through",fontFamily:"'Source Sans 3',sans-serif"}}>{fmt(getWorstPrice(prod))}</span>
                          <span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:13,color:"#6DBF6D"}}>{fmt(prod.prices[store.id])}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{background:"#080E1C",border:"1px solid #131E30",borderRadius:12,padding:16,marginBottom:16}}>
              <div style={{fontSize:10,fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"#1F2D45",marginBottom:12}}>{lang==="BG"?"ДЪЛГОСРОЧНА ПРОГНОЗА":"LONG-TERM PROJECTION"}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {(lang==="BG"?[["1 месец",4],["3 месеца",13],["6 месеца",26],["1 година",52]]:[["1 month",4],["3 months",13],["6 months",26],["1 year",52]]).map(([label,mult])=>(
                  <div key={label} style={{flex:1,minWidth:86,background:"#0D1520",border:"1px solid #172030",borderRadius:8,padding:"11px 10px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase",marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:900,color:"#E8C547"}}>{fmt(savings*mult)}</div>
                  </div>
                ))}
              </div>
            </div>

            {watchlist.size>0&&<div style={{background:"#060D1A",border:"1px solid #0D2030",borderRadius:12,padding:16}}>
              <div style={{fontSize:10,fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"#1A4050",marginBottom:12}}>🔔 PRICE WATCHLIST ({watchlist.size} items)</div>
              {PRODUCTS.filter(p=>watchlist.has(p.id)).map(prod=>(
                <div key={prod.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0A1020"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:30,height:30,objectFit:"contain",borderRadius:5,background:"#0D1520",flexShrink:0}}/>
                    <div>
                      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</div>
                      <div style={{fontSize:10,color:"#2A5060",fontFamily:"'Source Sans 3',sans-serif",marginTop:1}}>Best: {fmt(getBestPrice(prod))} at {STORES.find(s=>s.id===getBestStore(prod)).name}</div>
                    </div>
                  </div>
                  <button onClick={()=>toggleWatch(prod.id)} style={{background:"none",border:"none",color:"#1A5060",cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              ))}
            </div>}
          </>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Spesti/>);
  </script>
</body>
</html>
