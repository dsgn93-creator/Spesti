// ─── HAVERSINE DISTANCE ──────────────────────────────────────────────────────
function distKm(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  ids.forEach(id=>{if(p.prices[id]!=null&&p.prices[id]<bv){bv=p.prices[id];best=id;}});
  return best;
}
function getBestPrice(p,activeStores){
  const ids=(activeStores||STORE_IDS).filter(id=>p.prices[id]!=null);
  return ids.length?Math.min(...ids.map(id=>p.prices[id])):null;
}
function getWorstPrice(p,activeStores){
  const ids=(activeStores||STORE_IDS).filter(id=>p.prices[id]!=null);
  return ids.length?Math.max(...ids.map(id=>p.prices[id])):null;
}
function fmt(v){return v!=null?`€${v.toFixed(2)}`:"—";}
function perUnit(p,activeStores){
  const bp=getBestPrice(p,activeStores); if(!bp||!p.size) return null;
  if(p.size.includes("kg")&&!p.size.includes("×")){const kg=parseFloat(p.size);return kg&&kg!==1?fmt(bp/kg)+"/kg":null;}
  if(p.size.includes("L")&&!p.size.includes("×")){const l=parseFloat(p.size);return l&&l!==1?fmt(bp/l)+"/L":null;}
  return null;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data, width=80, height=24}){
  if(!data||data.length<2) return null;
  const mn=Math.min(...data), mx=Math.max(...data);
  const range=mx-mn||0.01;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-((v-mn)/range)*(height-4)-2;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  const trend=data[data.length-1]-data[0];
  const trendColor=trend>0.01?"#E05050":trend<-0.01?"#6DBF6D":"#4A5A75";
  const lastParts=pts.split(" ").pop().split(",");
  return (
    <svg width={width} height={height} style={{display:"block",flexShrink:0}}>
      <polyline points={pts} fill="none" stroke={trendColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={parseFloat(lastParts[0])} cy={parseFloat(lastParts[1])} r="2.5" fill={trendColor}/>
    </svg>
  );
}

function spestiScore(savings, worstTotal, listCount){
  if(!worstTotal||!listCount) return null;
  const pctSaved=(savings/worstTotal)*100;
  const efficiency=Math.min(pctSaved/12,1)*70;
  const coverage=Math.min(listCount/10,1)*30;
  return Math.round(efficiency+coverage);
}

function PriceBar({prod,activeStores}){

  if(!storeArr.length) return null;
  const bestId=getBestStore(prod,[...activeStores]);
  const bestP=getBestPrice(prod,[...activeStores]);
  const worstP=getWorstPrice(prod,[...activeStores]);
  const worstId=storeArr.reduce((a,b)=>prod.prices[b.id]>prod.prices[a.id]?b:a).id;
  return (
    <div>
      {storeArr.map(store=>{
        const price=prod.prices[store.id],isBest=store.id===bestId,isWorst=store.id===worstId;
        const barW=((price-bestP)/Math.max(worstP-bestP,0.01))*55+10;
        return (
          <div key={store.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:88,display:"flex",alignItems:"center",gap:6}}>

            </div>
            <div style={{minWidth:52,textAlign:"right",fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:14,color:isBest?"#6DBF6D":isWorst?"#E05050":"#A8A090"}}>{fmt(price)}</div>
            <div style={{minWidth:70,fontSize:9,fontFamily:"'Source Sans 3',sans-serif"}}>

  );

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{meta.sizes.map(s=><Chip key={s} label={s} selected={p.sizes.includes(s)} onToggle={()=>set("sizes",p.sizes.includes(s)?p.sizes.filter(x=>x!==s):[...p.sizes,s])}/>)}</div>
      </div>}
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:20,paddingBottom:4}}>
        {catProds.slice(0,5).map(prod=>(
          <div key={prod.id} style={{flexShrink:0,width:86,background:"#0D1520",border:"1px solid #1A2540",borderRadius:10,padding:9,textAlign:"center"}}>
            <img src={prod.img} alt={prod.nameEN} onError={e=>e.target.style.display="none"} style={{width:46,height:46,objectFit:"contain",borderRadius:6,marginBottom:4}}/>
            <div style={{fontSize:10,color:"#4A5A75",fontFamily:"'Source Sans 3',sans-serif"}}>{prod.brand}</div>
            <div style={{fontSize:13,color:"#6DBF6D",fontFamily:"'Playfair Display',serif",fontWeight:800,marginTop:2}}>{fmt(getBestPrice(prod,STORE_IDS))}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onNext} style={{flex:1,background:"#E8C547",border:"none",borderRadius:8,padding:"14px 20px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:14,color:"#09111F",cursor:"pointer"}}>
          {isLast?"✓ Finish Setup":"Next: "+ONBOARD_CATS[stepNum+1]+" →"}
        </button>
        <button onClick={onSkip} style={{background:"none",border:"1px solid #1F2D45",borderRadius:8,padding:"14px 16px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:13,color:"#3A4A65",cursor:"pointer"}}>Skip</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Spesti(){
  const [phase,setPhase]         = useState("welcome");
  // onboarding: "location" step + pref steps
  const [onboardStage,setOStage] = useState("location"); // "location" | "prefs"
  const [step,setStep]           = useState(0);
  const [prefs,setPrefs]         = useState({});
  const [activeStores,setActive] = useState(new Set(STORE_IDS)); // which chains user shops at
  const [userLoc,setUserLoc]     = useState(null);
  const [lang,setLang]           = useState("EN");
  const [view,setView]           = useState("list");
  const [weeklyList,setList]     = useState(new Set(DEFAULT_LIST));
  const [quantities,setQtys]     = useState({});
  const [search,setSearch]       = useState("");
  const [selCat,setSelCat]       = useState("All");
  const [expandedId,setExpId]    = useState(null);
  const [selStore,setSelStore]   = useState(null);
  const [animIn,setAnimIn]       = useState(false);
  const [watchlist,setWatch]     = useState(new Set());
  const [sortMode,setSortMode]   = useState("savings");
  const [showStoreMgr,setStoreMgr] = useState(false);

  useEffect(()=>{ setTimeout(()=>setAnimIn(true),80); },[]);

  const activeArr = [...activeStores];
  const activeChains = ALL_CHAINS.filter(c=>activeStores.has(c.id));

  const pname = prod => lang==="BG"?prod.nameBG:prod.nameEN;
  const getQty = id => quantities[id]||1;
  const toggleItem = id => setList(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });
  const toggleWatch = id => setWatch(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });

  const applyPrefs = prod=>{
    const cp=prefs[prod.category]; if(!cp) return true;
    if(!cp.anyBrand&&cp.brands.length>0&&!cp.brands.includes(prod.brand)) return false;
    if(cp.excludedBrands?.includes(prod.brand)) return false;
    if(!cp.anyFat&&cp.fats?.length>0&&prod.fatPct&&!cp.fats.includes(prod.fatPct)) return false;
    if(cp.sizes?.length>0&&prod.size&&!cp.sizes.includes(prod.size)) return false;
    return true;
  };

  // Only include products that have at least one price in user's active stores
  const visibleProds = useMemo(()=>PRODUCTS.filter(p=>applyPrefs(p)&&activeArr.some(id=>p.prices[id]!=null)),[prefs,activeStores]);
  const searchProds  = useMemo(()=>visibleProds.filter(p=>
    pname(p).toLowerCase().includes(search.toLowerCase())&&(selCat==="All"||p.category===selCat)
  ),[visibleProds,search,selCat,lang]);

  const listItems      = PRODUCTS.filter(p=>weeklyList.has(p.id));
  const optimizedTotal = listItems.reduce((s,p)=>s+(getBestPrice(p,activeArr)||0)*getQty(p.id),0);
  const worstTotal     = listItems.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
  const savings        = worstTotal-optimizedTotal;
  const savingsPct     = worstTotal>0?((savings/worstTotal)*100).toFixed(0):0;

  const storeBreakdown = activeChains.map(store=>{
    const items=listItems.filter(p=>getBestStore(p,activeArr)===store.id&&p.prices[store.id]!=null);
    const total=items.reduce((s,p)=>s+(p.prices[store.id]||0)*getQty(p.id),0);
    const altTotal=items.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
    return {...store,items,total,storeSavings:altTotal-total};
  }).filter(s=>s.items.length>0);

  const sortedListProdsFor = cat => {
    const items=visibleProds.filter(p=>p.category===cat&&(search===""||pname(p).toLowerCase().includes(search.toLowerCase())));
    if(sortMode==="savings") return [...items].sort((a,b)=>((getWorstPrice(b,activeArr)||0)-(getBestPrice(b,activeArr)||0))-((getWorstPrice(a,activeArr)||0)-(getBestPrice(a,activeArr)||0)));
    if(sortMode==="price")   return [...items].sort((a,b)=>(getBestPrice(a,activeArr)||0)-(getBestPrice(b,activeArr)||0));
    return [...items].sort((a,b)=>pname(a).localeCompare(pname(b)));
  };

  const cats=["All",...Object.keys(CAT_ICONS)];

  // ── WELCOME ────────────────────────────────────────────────────────────────
  if(phase==="welcome") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 18% 50%,#0B1E3A 0%,#05090F 65%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>
      <style>{CSS}</style>
      <div style={{maxWidth:460,textAlign:"center",width:"100%"}}>
        <div style={{fontSize:46,marginBottom:10}}>🛒</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:46,fontWeight:900,color:"#E8C547",lineHeight:1}}>Spesti</div>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#2A3A55",letterSpacing:"3px",textTransform:"uppercase",marginTop:7,marginBottom:10}}>Смарт пазаруване · Smart Shopping · Bulgaria</div>
        <div style={{display:"flex",justifyContent:"center",gap:7,marginBottom:28,flexWrap:"wrap"}}>
          {LIVE_CHAINS.map(s=><StoreBadge key={s.id} chainId={s.id} size={26} showName={true}/>)}
        </div>
        <div style={{background:"#0A1420",border:"1px solid #172030",borderRadius:14,padding:20,marginBottom:20,textAlign:"left"}}>
          {[["📍","Finds stores near you & shows only what's available in your city"],["💰","Shows exactly how much you save every single week"],["🎯","Personalised to your brands, fat % and sizes"],["📋","Builds your weekly list → store-by-store shopping plan"],["🔜","15 more Bulgarian chains being added"]].map(([ic,tx])=>(
            <div key={tx} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10,fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#6A7A90",lineHeight:1.4}}>
              <span style={{fontSize:17,flexShrink:0}}>{ic}</span>{tx}
            </div>
          ))}
        </div>
        <button onClick={()=>setPhase("onboarding")} style={{width:"100%",background:"#E8C547",border:"none",borderRadius:10,padding:"16px 28px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:15,color:"#09111F",cursor:"pointer",marginBottom:10}}>
          Set Up My Profile →
        </button>
        <button onClick={()=>setPhase("app")} style={{width:"100%",background:"none",border:"1px solid #172030",borderRadius:10,padding:"12px 28px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:13,color:"#3A4A65",cursor:"pointer"}}>
          Skip — browse everything
        </button>
      </div>
    </div>
  );

  // ── ONBOARDING ─────────────────────────────────────────────────────────────
  if(phase==="onboarding"){
    const totalSteps = ONBOARD_CATS.length + 1; // +1 for location step
    const curStepNum = onboardStage==="location" ? 0 : step+1;
    return (
      <div style={{minHeight:"100vh",background:"#05090F",color:"#EDE5D0"}}>
        <style>{CSS}</style>
        <div style={{background:"#090F1D",borderBottom:"1px solid #131E30",padding:"12px 20px",display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,color:"#E8C547",fontSize:19}}>🛒 Spesti</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>
                {onboardStage==="location"?"Step 1 — Your Stores":`Step ${curStepNum+1} — ${ONBOARD_CATS[step]}`}
              </span>
              <span style={{fontSize:10,color:"#E8C547",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700}}>{curStepNum+1} / {totalSteps}</span>
            </div>
            <div style={{background:"#131E30",borderRadius:3,height:4}}>
              <div style={{width:(((curStepNum+1)/totalSteps)*100)+"%",height:"100%",background:"#E8C547",borderRadius:3,transition:"width 0.3s"}}/>
            </div>
          </div>
        </div>
        <div style={{maxWidth:540,margin:"0 auto",padding:"26px 20px 60px"}} className="slidein">
          {onboardStage==="location"
            ? <NearbyStores userLoc={userLoc} activeStores={activeStores} setActiveStores={setActive}
                onDone={()=>setOStage("prefs")}/>
            : <OnboardStep cat={ONBOARD_CATS[step]} prefs={prefs} setPrefs={setPrefs} stepNum={step}
                isLast={step===ONBOARD_CATS.length-1}
                onNext={()=>{ if(step<ONBOARD_CATS.length-1)setStep(s=>s+1); else setPhase("app"); }}
                onSkip={()=>{ if(step<ONBOARD_CATS.length-1)setStep(s=>s+1); else setPhase("app"); }}
              />
          }
        </div>
      </div>
    );
  }

  // ── STORE MANAGER MODAL ────────────────────────────────────────────────────
  if(showStoreMgr) return (
    <div style={{minHeight:"100vh",background:"#05090F",color:"#EDE5D0"}}>
      <style>{CSS}</style>
      <div style={{background:"#090F1D",borderBottom:"1px solid #131E30",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,color:"#E8C547",fontSize:19}}>🏪 My Stores</div>
        <button onClick={()=>setStoreMgr(false)} className="ctrl-btn">← Back</button>
      </div>
      <div style={{maxWidth:540,margin:"0 auto",padding:"24px 20px 60px"}}>
        <NearbyStores userLoc={userLoc} activeStores={activeStores} setActiveStores={setActive} onDone={()=>setStoreMgr(false)}/>
      </div>
    </div>
  );

  // ── APP ────────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#05090F",color:"#EDE5D0"}}>
      <style>{CSS}</style>

      {/* HEADER */}
      <div style={{background:"#080E1C",borderBottom:"1px solid #131E30",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"0 14px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:11,paddingBottom:3}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:900,color:"#E8C547",lineHeight:1}}>🛒 Spesti</div>
                <div style={{fontSize:8,color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginTop:1}}>Smart Grocery · Bulgaria</div>
              </div>
              {/* Active store logos */}
              <div style={{display:"flex",gap:3,marginLeft:6}}>
                {activeChains.map(c=><ChainLogo key={c.id} chainId={c.id} size={20}/>)}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              {weeklyList.size>0&&<div style={{background:"#E8C547",color:"#09111F",borderRadius:"50%",width:20,height:20,fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Source Sans 3',sans-serif"}}>{weeklyList.size}</div>}
              {watchlist.size>0&&<div style={{background:"#0D2A3A",border:"1px solid #1A5060",borderRadius:6,padding:"3px 7px",fontSize:9,color:"#4ABFD0",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700}}>🔔 {watchlist.size}</div>}
              <button onClick={()=>setStoreMgr(true)} className="ctrl-btn" style={{display:"flex",alignItems:"center",gap:4}}>
                🏪 <span style={{fontSize:10,fontWeight:800,color:"#E8C547"}}>{activeStores.size}</span>
              </button>
              <button onClick={()=>{setPhase("onboarding");setOStage("prefs");setStep(0);}} className="ctrl-btn">⚙</button>
              <div className="lang-toggle">
                <button className={"lang-btn"+(lang==="EN"?" active":"")} onClick={()=>setLang("EN")}>EN</button>
                <button className={"lang-btn"+(lang==="BG"?" active":"")} onClick={()=>setLang("BG")}>БГ</button>
              </div>
            </div>
          </div>
          <div style={{display:"flex",overflowX:"auto",marginTop:4}}>
            {[["list","📋 My List"],["search","🔍 Find Item"],["storeview","🏪 By Store"],["summary","💰 Savings"]].map(([id,label])=>(
              <button key={id} className={"nav-tab"+(view===id?" active":"")} onClick={()=>{setView(id);setExpId(null);}}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"20px 14px 64px"}} className={"fade"+(animIn?" in":"")}>

        {/* ══ TAB: MY LIST ══ */}
        {view==="list"&&<div>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,marginBottom:3}}>{lang==="BG"?"Седмичен Списък":"Weekly Shopping List"}</div>
            <div style={{fontSize:12,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>
              Comparing {activeStores.size} store{activeStores.size!==1?"s":""}: {activeChains.map(c=>c.name).join(" · ")}
            </div>
          </div>

          {listItems.length>0&&<div style={{background:"linear-gradient(90deg,#081A08,#061006)",border:"1px solid #163016",borderRadius:10,padding:"12px 15px",marginBottom:15,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginBottom:2}}>THIS WEEK</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#6DBF6D"}}>✓ {listItems.length} items selected</span>
            </div>
            <div style={{display:"flex",gap:18,alignItems:"center"}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>Best Total</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#6DBF6D"}}>{fmt(optimizedTotal)}</div>
              </div>
              <div style={{width:1,height:30,background:"#1A3A1A"}}/>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>You Save</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#E8C547"}}>{fmt(savings)}</div>
              </div>
              <button onClick={()=>setView("storeview")} style={{background:"#E8C547",border:"none",borderRadius:7,padding:"7px 11px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,fontSize:10,color:"#09111F",cursor:"pointer"}}>PLAN →</button>
            </div>
          </div>}

          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
            <button className="ctrl-btn" onClick={()=>setList(new Set(visibleProds.map(p=>p.id)))}>All</button>
            <button className="ctrl-btn" onClick={()=>setList(new Set(DEFAULT_LIST))}>↺ Default</button>
            <button className="ctrl-btn" onClick={()=>setList(new Set())}>Clear</button>
            <div style={{flex:1}}/>
            <span style={{fontSize:9,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px"}}>SORT:</span>
            {[["savings","💰"],["price","€"],["az","A–Z"]].map(([m,lbl])=>(
              <button key={m} className={"ctrl-btn"+(sortMode===m?" active":"")} onClick={()=>setSortMode(m)}>{lbl}</button>
            ))}
          </div>

          <div style={{marginBottom:14}}><input className="inp" placeholder="Search your list…" value={search} onChange={e=>setSearch(e.target.value)}/></div>

          {Object.keys(CAT_ICONS).map(cat=>{
            const catProds=sortedListProdsFor(cat);
            if(!catProds.length) return null;
            const selCount=catProds.filter(p=>weeklyList.has(p.id)).length;
            return (
              <div key={cat} style={{marginBottom:20}}>
                <div style={{fontSize:10,fontFamily:"'Source Sans 3',sans-serif",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"#1F2D45",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span>{CAT_ICONS[cat]}</span>{cat}<span style={{color:"#131E30",fontWeight:400,marginLeft:2}}>({selCount}/{catProds.length})</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {catProds.map(prod=>{
                    const isIn=weeklyList.has(prod.id);
                    const bestId=getBestStore(prod,activeArr);
                    const bestChain=ALL_CHAINS.find(c=>c.id===bestId)||{color:"#444",name:"?"};
                    const qty=getQty(prod.id);
                    const bp=getBestPrice(prod,activeArr);
                    const wp=getWorstPrice(prod,activeArr);
                    const unitSave=(wp||0)-(bp||0);
                    return (
                      <div key={prod.id} className={"icard"+(isIn?" inlist":"")} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px"}}>
                        <div className={"check-box"+(isIn?" chk":"")} onClick={()=>toggleItem(prod.id)}>
                          {isIn&&<span style={{color:"#09111F",fontSize:12,fontWeight:900}}>✓</span>}
                        </div>
                        <img src={prod.img} alt={pname(prod)} onError={e=>e.target.style.display="none"} style={{width:40,height:40,objectFit:"contain",borderRadius:6,background:"#131E30",flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,color:"#EDE5D0"}}>{pname(prod)}</span>
                            {prod.sale&&prod.sale[bestId]&&<span className="sale-tag">SALE</span>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                            <StoreBadge chainId={bestId} size={15} showName={true}/>
                            {perUnit(prod,activeArr)&&<span style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>{perUnit(prod,activeArr)}</span>}

                          </div>
                        </div>
                        {isIn&&<div style={{display:"flex",alignItems:"center",gap:4}}>
                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:Math.max(1,qty-1)}))}>−</button>

                          <button className="qty-btn" onClick={()=>setQtys(p=>({...p,[prod.id]:qty+1}))}>+</button>
                        </div>}
                        <div style={{textAlign:"right",minWidth:60}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:15,color:isIn?"#E8C547":"#2A3A55"}}>{fmt((bp||0)*qty)}</div>
                          <button className="watch-btn" onClick={()=>toggleWatch(prod.id)} style={{opacity:watchlist.has(prod.id)?1:0.4,color:watchlist.has(prod.id)?"#E8C547":"inherit"}}>
                            {watchlist.has(prod.id)?"🔔":"🔕"}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>}

        {/* ══ TAB: FIND ITEM ══ */}
        {view==="search"&&<div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800,marginBottom:3}}>Find a Product</div>
          <div style={{fontSize:12,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginBottom:14}}>
            Comparing {activeChains.map(c=>c.name).join(" · ")} · <button onClick={()=>setStoreMgr(true)} style={{background:"none",border:"none",color:"#4ABFD0",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,textDecoration:"underline",padding:0}}>change stores</button>
          </div>

          <div style={{position:"relative",marginBottom:12}}>
            <input className="inp" placeholder="Search… (milk, beef, eggs, coffee)" value={search} onChange={e=>{setSearch(e.target.value);setExpId(null);}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#3A4A65",fontSize:20,cursor:"pointer"}}>×</button>}
          </div>

          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:3}}>
            {cats.map(c=>(
              <button key={c} className={"cat-pill"+(selCat===c?" active":"")} onClick={()=>setSelCat(c)}>
                {c==="All"?"All":(CAT_ICONS[c]||"")+" "+c}
              </button>
            ))}
          </div>

                    <div>
                      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</div>
                      <div style={{fontSize:10,color:"#2A5060",fontFamily:"'Source Sans 3',sans-serif",marginTop:1}}>Best: {fmt(getBestPrice(prod,activeArr))} at {ALL_CHAINS.find(c=>c.id===getBestStore(prod,activeArr))?.name||"?"}</div>
                    </div>
                  </div>
                  <button onClick={()=>toggleWatch(prod.id)} style={{background:"none",border:"none",color:"#1A5060",cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              ))}
            </div>}
          </>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Spesti/>);
  </script>
</body>
</html>
